<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <rect width="600" height="800" fill="#F2EEE9"/>
  <!-- Skirt body -->
  <path d="M230 200 L370 200 Q375 200 375 205 L375 230 L430 600 Q435 620 410 620 L190 620 Q165 620 170 600 L225 230 L225 205 Q225 200 230 200 Z" fill="#2D3A2D" stroke="#1D2A1D" stroke-width="2"/>
  <!-- Waistband -->
  <rect x="225" y="200" width="150" height="30" rx="2" fill="#1D2A1D" stroke="#0D1A0D" stroke-width="1.5"/>
  <!-- Satin waistband shine -->
  <rect x="230" y="205" width="140" height="8" rx="2" fill="#3D4A3D" opacity="0.4"/>
  <!-- Pleats -->
  <line x1="250" y1="230" x2="210" y2="620" stroke="#1D2A1D" stroke-width="1.5" opacity="0.5"/>
  <line x1="275" y1="230" x2="250" y2="620" stroke="#1D2A1D" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="230" x2="300" y2="620" stroke="#1D2A1D" stroke-width="1.5" opacity="0.5"/>
  <line x1="325" y1="230" x2="350" y2="620" stroke="#1D2A1D" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="230" x2="390" y2="620" stroke="#1D2A1D" stroke-width="1.5" opacity="0.5"/>
  <!-- Pleat folds (lighter) -->
  <line x1="260" y1="230" x2="225" y2="620" stroke="#3D4A3D" stroke-width="1" opacity="0.3"/>
  <line x1="285" y1="230" x2="270" y2="620" stroke="#3D4A3D" stroke-width="1" opacity="0.3"/>
  <line x1="315" y1="230" x2="330" y2="620" stroke="#3D4A3D" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="230" x2="370" y2="620" stroke="#3D4A3D" stroke-width="1" opacity="0.3"/>
  <!-- Hanger -->
  <path d="M300 110 L300 150 M250 150 Q300 130 350 150" fill="none" stroke="#B5A595" stroke-width="2" stroke-linecap="round"/>
  <circle cx="300" cy="108" r="6" fill="none" stroke="#B5A595" stroke-width="2"/>
  <!-- Label -->
  <text x="300" y="700" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" letter-spacing="3" fill="#2D3A2D">PLEATED SKIRT</text>
  <text x="300" y="725" text-anchor="middle" font-family="system-ui" font-size="11" letter-spacing="2" fill="#6D7A6D">RENÉRI COUTURE</text>
</svg>
