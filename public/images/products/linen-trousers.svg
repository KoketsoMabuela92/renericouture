  <path d="M300 90 L300 130 M250 130 Q300 110 350 130" fill="none" stroke="#B5A595" stroke-width="2" stroke-linecap="round"/>
  <circle cx="300" cy="88" r="6" fill="none" stroke="#B5A595" stroke-width="2"/>
  <!-- Label -->
  <text x="300" y="710" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" letter-spacing="3" fill="#A09080">LINEN TROUSERS</text>
  <text x="300" y="735" text-anchor="middle" font-family="system-ui" font-size="11" letter-spacing="2" fill="#C0B0A0">RENÉRI COUTURE</text>
