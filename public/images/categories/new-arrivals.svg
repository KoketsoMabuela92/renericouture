<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" fill="#F5F0F5"/>
  <!-- Shopping bags -->
  <g transform="translate(80, 80)">
    <!-- Bag 1 (back) -->
    <rect x="60" y="100" width="140" height="180" rx="8" fill="#E8D8E0" stroke="#D0C0C8" stroke-width="1.5"/>
    <path d="M100 100 Q100 60 130 60 Q160 60 160 100" fill="none" stroke="#D0C0C8" stroke-width="3" stroke-linecap="round"/>
    <!-- Tissue paper -->
    <path d="M80 100 Q100 80 120 95 Q140 75 160 90 Q180 78 190 100" fill="#F8F0F4" stroke="#E8D8E0" stroke-width="1"/>
    
    <!-- Bag 2 (front) -->
    <rect x="20" y="140" width="130" height="170" rx="8" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1.5"/>
    <path d="M50 140 Q50 105 85 105 Q120 105 120 140" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
    <!-- Brand label -->
    <rect x="50" y="200" width="70" height="25" rx="3" fill="#3A3A3A"/>
    <text x="85" y="217" text-anchor="middle" font-family="system-ui" font-size="7" letter-spacing="2" fill="#999">RENÉRI</text>
  </g>
  <!-- Sparkles/stars -->
  <g fill="#C4943C" opacity="0.6">
    <path d="M320 120 L322 126 L328 128 L322 130 L320 136 L318 130 L312 128 L318 126 Z"/>
    <path d="M80 60 L81.5 64 L86 65.5 L81.5 67 L80 71 L78.5 67 L74 65.5 L78.5 64 Z"/>
    <path d="M300 350 L302 356 L308 358 L302 360 L300 366 L298 360 L292 358 L298 356 Z"/>
    <path d="M100 400 L101.5 404 L106 405.5 L101.5 407 L100 411 L98.5 407 L94 405.5 L98.5 404 Z"/>
  </g>
  <!-- "NEW" tag -->
  <g transform="translate(260, 250)">
    <rect x="0" y="0" width="60" height="30" rx="4" fill="#C4943C"/>
    <text x="30" y="20" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="2" fill="#FFF">NEW</text>
    <!-- Tag hole -->
    <circle cx="8" cy="15" r="3" fill="#A87830"/>
  </g>
  <!-- Text -->
  <text x="200" y="470" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="2" fill="#6A4A6A">NEW ARRIVALS</text>
</svg>
