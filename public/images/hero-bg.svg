<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" fill="none">
  <!-- Background gradient -->
  <rect width="1920" height="900" fill="#0A0A0A"/>
  
  <!-- Fashion model silhouette on the right -->
  <g opacity="0.25" transform="translate(1050, 50)">
    <!-- Hair -->
    <ellipse cx="320" cy="80" rx="60" ry="70" fill="#1A1A1A"/>
    <path d="M280 60 Q300 20 350 30 Q390 40 380 80 Q375 100 370 120 L270 120 Q265 100 260 80 Z" fill="#1A1A1A"/>
    <!-- Face/neck -->
    <ellipse cx="320" cy="120" rx="35" ry="45" fill="#2A2520"/>
    <rect x="310" y="160" width="20" height="40" rx="8" fill="#2A2520"/>
    <!-- Shoulder area / dress top -->
    <path d="M250 200 Q280 190 320 185 Q360 190 390 200 L430 240 Q440 260 430 270 L390 280 L390 500 Q390 520 370 530 L270 530 Q250 520 250 500 L250 280 L210 270 Q200 260 210 240 Z" fill="#1A1A1A"/>
    <!-- Dress flowing -->
    <path d="M250 530 Q240 600 220 750 Q215 780 240 800 L400 800 Q425 780 420 750 Q400 600 390 530 Z" fill="#1A1A1A"/>
    <!-- Belt/waist detail -->
    <rect x="255" y="380" width="130" height="8" rx="3" fill="#2A2A2A"/>
    <!-- Arm left -->
    <path d="M250 210 L200 350 Q195 370 210 375 L250 360" fill="none" stroke="#1A1A1A" stroke-width="20" stroke-linecap="round"/>
    <!-- Arm right (on hip) -->
    <path d="M390 210 L430 320 Q435 340 420 345 L395 380" fill="none" stroke="#1A1A1A" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Decorative fashion elements -->
  <g opacity="0.08">
    <!-- Fabric texture lines -->
    <path d="M0 200 Q300 180 600 220 Q900 260 1200 200 Q1500 140 1920 220" fill="none" stroke="#fff" stroke-width="1"/>
    <path d="M0 400 Q300 380 600 420 Q900 460 1200 400 Q1500 340 1920 420" fill="none" stroke="#fff" stroke-width="1"/>
    <path d="M0 600 Q300 580 600 620 Q900 660 1200 600 Q1500 540 1920 620" fill="none" stroke="#fff" stroke-width="1"/>
    <path d="M0 800 Q300 780 600 820 Q900 860 1200 800 Q1500 740 1920 820" fill="none" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Scattered fashion accessories -->
  <g opacity="0.12">
    <!-- Dress form on far right -->
    <g transform="translate(1600, 300)">
      <ellipse cx="40" cy="20" rx="25" ry="15" fill="#222"/>
      <path d="M20 35 L15 200 Q15 210 25 210 L55 210 Q65 210 65 200 L60 35" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
      <line x1="40" y1="210" x2="40" y2="280" stroke="#333" stroke-width="2"/>
      <ellipse cx="40" cy="285" rx="25" ry="6" fill="#222" stroke="#333" stroke-width="1"/>
    </g>
    
    <!-- Scissors -->
    <g transform="translate(150, 650) rotate(-20)">
      <ellipse cx="15" cy="15" rx="15" ry="12" fill="none" stroke="#444" stroke-width="2"/>
      <ellipse cx="15" cy="55" rx="15" ry="12" fill="none" stroke="#444" stroke-width="2"/>
      <line x1="15" y1="27" x2="85" y2="30" stroke="#444" stroke-width="2"/>
      <line x1="15" y1="43" x2="85" y2="40" stroke="#444" stroke-width="2"/>
    </g>

    <!-- Measuring tape curve -->
    <path d="M800 700 Q900 650 1000 700 Q1100 750 1200 700" fill="none" stroke="#444" stroke-width="3" stroke-dasharray="10 5"/>
  </g>

  <!-- Soft light glow -->
  <radialGradient id="glow1" cx="70%" cy="40%" r="40%">
    <stop offset="0%" stop-color="#fff" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </radialGradient>
  <rect width="1920" height="900" fill="url(#glow1)"/>
  
  <!-- Bottom fade for text contrast -->
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="60%" stop-color="#0A0A0A" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0.8"/>
  </linearGradient>
  <rect width="1920" height="900" fill="url(#bottomFade)"/>
</svg>
